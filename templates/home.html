<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Predictor</title>

    <!-- Bootstrap for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .container-box {
            width: 500px;
            margin: auto;
            margin-top: 50px;
            padding: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
    </style>
</head>
<body>

<div class="container-box">

    <h2 class="text-center mb-4">Student Exam Performance Predictor</h2>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <!-- Gender -->
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" required>
                <option selected disabled value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <!-- Race -->
        <div class="mb-3">
            <label class="form-label">Race or Ethnicity</label>
            <select class="form-control" name="race_ethnicity" required>
                <option selected disabled value="">Select Race</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <!-- Education -->
        <div class="mb-3">
            <label class="form-label">Parental Level of Education</label>
            <select class="form-control" name="parental_level_of_education" required>
                <option selected disabled value="">Select Education</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="some college">Some College</option>
                <option value="master's degree">Master's Degree</option>
                <option value="associate's degree">Associate's Degree</option>
                <option value="high school">High School</option>
                <option value="some high school">Some High School</option>
            </select>
        </div>

        <!-- Lunch -->
        <div class="mb-3">
            <label class="form-label">Lunch Type</label>
            <select class="form-control" name="lunch" required>
                <option selected disabled value="">Select Lunch</option>
                <option value="standard">Standard</option>
                <option value="free/reduced">Free/Reduced</option>
            </select>
        </div>

        <!-- Test Prep -->
        <div class="mb-3">
            <label class="form-label">Test Preparation Course</label>
            <select class="form-control" name="test_preparation_course" required>
                <option selected disabled value="">Select Course</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <!-- Reading Score -->
        <div class="mb-3">
            <label class="form-label">Reading Score</label>
            <input type="number" class="form-control" name="reading_score" required>
        </div>

        <!-- Writing Score -->
        <div class="mb-3">
            <label class="form-label">Writing Score</label>
            <input type="number" class="form-control" name="writing_score" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Predict Math Score</button>

    </form>

    <!-- Output -->
    <div class="mt-4 text-center">
        {% if results %}
            <h4>Predicted Math Score: {{ results }}</h4>
        {% endif %}
    </div>

</div>

</body>
</html>
